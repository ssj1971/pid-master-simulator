<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PID Line-Follower Master | Professional Simulator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">🤖</span>
                <h1>PID Master</h1>
            </div>
            
            <div class="control-group">
                <h3>PID Tuning</h3>
                <div class="slider-item">
                    <label>Proportional (Kp) <span id="kp-val">1.5</span></label>
                    <input type="range" id="kp" min="0" max="10" step="0.1" value="1.5">
                </div>
                <div class="slider-item">
                    <label>Integral (Ki) <span id="ki-val">0.05</span></label>
                    <input type="range" id="ki" min="0" max="1" step="0.001" value="0.05">
                </div>
                <div class="slider-item">
                    <label>Derivative (Kd) <span id="kd-val">2.5</span></label>
                    <input type="range" id="kd" min="0" max="20" step="0.1" value="2.5">
                </div>
            </div>

            <div class="control-group">
                <h3>Physical Parameters</h3>
                <div class="slider-item">
                    <label>Motor Power <span id="speed-val">80</span></label>
                    <input type="range" id="speed" min="20" max="255" value="80">
                </div>
                <div class="slider-item">
                    <label>Friction/Drag <span id="friction-val">0.1</span></label>
                    <input type="range" id="friction" min="0" max="0.5" step="0.01" value="0.1">
                </div>
            </div>

            <div class="actions">
                <button id="reset-btn" class="btn secondary">Reset Simulation</button>
                <button id="export-btn" class="btn primary">Export Settings</button>
            </div>
        </aside>

        <main class="viewport">
            <div class="canvas-container">
                <canvas id="simulationCanvas"></canvas>
                <div class="overlay">
                    <div class="stat-card">
                        <label>Error</label>
                        <span id="stat-error">0.00</span>
                    </div>
                    <div class="stat-card">
                        <label>Correction</label>
                        <span id="stat-correction">0.00</span>
                    </div>
                </div>
            </div>
            
            <div class="analytics-panel">
                <div class="chart-container">
                    <canvas id="pidChart"></canvas>
                </div>
            </div>
        </main>
    </div>
    <script src="simulator.js"></script>
</body>
</html>
